<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Studio</title>
  <meta name="description" content="Get in touch with Studio.">
  <link rel="stylesheet" href="../../tokens/tokens.css">
  <link rel="stylesheet" href="../../tokens/fonts.css">
  <link rel="stylesheet" href="../../components/nav-sidebar/nav-sidebar.css">
  <link rel="stylesheet" href="../../components/nav-sidebar/menu-overlay.css">
  <link rel="stylesheet" href="../../components/section/section.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <!-- ── Left Sidebar: MENU rotated text ─────── -->
  <div class="nav-sidebar nav-sidebar--left" id="nav-left">
    <div class="nav-sidebar__menu-text" id="menu-trigger" role="button" tabindex="0">MENU</div>
  </div>

  <!-- ── Right Sidebar: Up/down chevrons ────── -->
  <div class="nav-sidebar nav-sidebar--right" id="nav-right">
    <button class="nav-arrow nav-arrow--up" id="scroll-up" aria-label="Previous">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M20 12L20 28M12 20L20 12L28 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="nav-sidebar__divider"></div>
    <button class="nav-arrow nav-arrow--down" id="scroll-down" aria-label="Next">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <path d="M20 28L20 12M12 20L20 28L28 20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- ── Menu Overlay ──────────────── -->
  <div class="menu-overlay" id="menu-overlay" aria-hidden="true">
    <button class="menu-overlay__close" id="menu-close" aria-label="Close menu">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
        <path d="M10 10L40 40M40 10L10 40" stroke="#F4F4F4" stroke-width="1.5"/>
      </svg>
    </button>
    <nav class="menu-overlay__nav">
      <a href="/pages/about/" class="menu-overlay__link">SOBRE NÓS</a>
      <a href="/pages/project/" class="menu-overlay__link">PROJETOS</a>
      <a href="/pages/services/" class="menu-overlay__link">UPCYCLING</a>
      <a href="/pages/contact/" class="menu-overlay__link">CONTACTO</a>
    </nav>
    <div class="menu-overlay__social">
      <a href="mailto:atelier@studio.com" class="menu-overlay__social-link">
        <svg width="70" height="70" viewBox="0 0 70 70" fill="none"><rect x="15" y="15" width="40" height="40" stroke="#F4F4F4" stroke-width="1.5" fill="none"/></svg>
      </a>
      <a href="#" class="menu-overlay__social-link">
        <svg width="75" height="75" viewBox="0 0 75 75" fill="none"><rect x="15" y="15" width="45" height="45" stroke="#F4F4F4" stroke-width="1.5" fill="none"/></svg>
      </a>
      <a href="#" class="menu-overlay__social-link">
        <svg width="70" height="70" viewBox="0 0 70 70" fill="none"><rect x="15" y="15" width="40" height="40" stroke="#F4F4F4" stroke-width="1.5" fill="none"/></svg>
      </a>
    </div>
  </div>

  <!-- ── Contact Section ─── Two-column white box -->
  <section class="section section--contact" id="Contact">
    <div class="section__white-box contact__white-box">

      <!-- LEFT COLUMN: Logo + social icons -->
      <div class="contact__left">
        <!-- Geometric "A" logo -->
        <div class="contact__logo">
          <svg width="60" height="70" viewBox="0 0 60 70" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Triangle / A shape -->
            <path d="M30 4 L56 66 H4 Z" stroke="#333333" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
            <!-- Crossbar -->
            <line x1="13" y1="46" x2="47" y2="46" stroke="#333333" stroke-width="1.5"/>
          </svg>
        </div>
        <!-- Social icons -->
        <div class="contact__social">
          <a href="https://wa.me/351916411167" class="contact__social-link" aria-label="WhatsApp">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <path d="M18 2C9.16 2 2 9.16 2 18c0 3.3 1 6.4 2.8 9L2 36l9.2-2.7C13.6 35 15.7 36 18 36c8.84 0 16-7.16 16-16S26.84 2 18 2z" stroke="#333333" stroke-width="1.2" fill="none"/>
              <path d="M12 16c.6-1 2.4-1.6 3.6-1 .6.4 1 1.4 1 1.4s.4-2.6 1.8-4c1.2-1 2.6-.6 3.2.4.4.6.4 1.8-.4 3-.6.8-.6 1.4-.2 1.8.4.4.8-.2 1.6-.8 1.2-1 1.6-1.8 1.8-2.4.2-.4.2-.8 0-1.2-.2-.4-1-2-1-2.8-.2-.6-.8-1.2-1.4-1.6-.6-.4-1.2-.4-1.6-.2-.6.2-1.8.8-2.8 2.6-1.2 2-1.2 2.8-1.2 3 0 .4-.2 1-.8 1.4-.6.6-1 .4-1.4 0z" fill="#333333"/>
            </svg>
          </a>
          <a href="https://www.facebook.com/cabanana.atelier" class="contact__social-link" aria-label="Facebook">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <path d="M18 2C9.16 2 2 9.16 2 18s7.16 16 16 16 16-7.16 16-16S26.84 2 18 2z" stroke="#333333" stroke-width="1.2" fill="none"/>
              <path d="M20 12h-3v-3h3V6h3v3h3l1 3h-4v7c0 1 1 2 2 2h3v3" stroke="#333333" stroke-width="1.2" fill="none"/>
            </svg>
          </a>
          <a href="https://www.instagram.com/cabanana.atelier/" class="contact__social-link" aria-label="Instagram">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <rect x="2" y="2" width="32" height="32" rx="6" stroke="#333333" stroke-width="1.2" fill="none"/>
              <circle cx="18" cy="18" r="6" stroke="#333333" stroke-width="1.2" fill="none"/>
              <circle cx="26" cy="10" r="1.5" fill="#333333"/>
            </svg>
          </a>
          <a href="mailto:atelier@studio.com" class="contact__social-link" aria-label="Email">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <rect x="2" y="8" width="32" height="22" stroke="#333333" stroke-width="1.2" fill="none"/>
              <path d="M2 10 L18 22 L34 10" stroke="#333333" stroke-width="1.2" fill="none"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- RIGHT COLUMN: Contact form -->
      <div class="contact__right">
        <form class="contact__form" id="contact-form" novalidate>

          <!-- 1. Dropdown: Request a Quote -->
          <div class="form-field form-field--select">
            <label class="form-field__label" for="request-type">Request a Quote</label>
            <div class="form-field__select-wrap">
              <select class="form-field__select" id="request-type" name="request-type">
                <option value="">Request a Quote</option>
                <option value="interior">Interior Design</option>
                <option value="space">Space Planning</option>
                <option value="lighting">Lighting Design</option>
                <option value="other">Other</option>
              </select>
              <svg class="form-field__chevron" width="12" height="8" viewBox="0 0 12 8" fill="none">
                <path d="M1 1L6 6L11 1" stroke="#333333" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>

          <!-- 2. Row: Name + E-mail -->
          <div class="form-row">
            <div class="form-field">
              <label class="form-field__label" for="name">Name*</label>
              <input class="form-field__input" type="text" id="name" name="name" required>
            </div>
            <div class="form-field">
              <label class="form-field__label" for="email">E-mail*</label>
              <input class="form-field__input" type="email" id="email" name="email" required>
            </div>
          </div>

          <!-- 3. Full width: Telephone -->
          <div class="form-field">
            <label class="form-field__label" for="telephone">Telephone</label>
            <input class="form-field__input" type="tel" id="telephone" name="telephone">
          </div>

          <!-- 4. Full width: Message -->
          <div class="form-field form-field--textarea">
            <label class="form-field__label" for="message">Message</label>
            <textarea class="form-field__input form-field__textarea" id="message" name="message" rows="4"></textarea>
          </div>

          <!-- 5. Pill ghost button -->
          <div class="form-field form-field--submit">
            <button type="submit" class="form-submit">To send</button>
          </div>

        </form>
      </div>

    </div>
  </section>

  <footer class="site-footer">
    <p class="site-footer__brand">Studio</p>
    <p class="site-footer__copy">© 2025 Studio. All rights reserved.</p>
  </footer>

  <script type="module">
    import NavSidebar from '../../components/nav-sidebar/nav-sidebar.js';
    const sidebar = new NavSidebar();

    // Form validation feedback
    const form = document.getElementById('contact-form');
    form?.addEventListener('submit', (e) => {
      e.preventDefault();
      const required = form.querySelectorAll('[required]');
      let valid = true;
      required.forEach(field => {
        if (!field.value.trim()) {
          field.classList.add('is-error');
          valid = false;
        } else {
          field.classList.remove('is-error');
        }
      });
      if (valid) {
        form.querySelector('.form-submit').textContent = 'Sent!';
        form.querySelector('.form-submit').classList.add('is-sent');
      }
    });
  </script>
</body>
</html>
