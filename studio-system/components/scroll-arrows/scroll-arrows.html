<!-- Scroll Arrows — fixed right edge, 0.3 opacity default -->
<div class="scroll-arrows" aria-label="Scroll navigation">
  <button class="scroll-arrows__btn scroll-arrows__btn--up" aria-label="Scroll up" onclick="window.scrollBy({top: -window.innerHeight, behavior: 'smooth'})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>
  <button class="scroll-arrows__btn scroll-arrows__btn--down" aria-label="Scroll down" onclick="window.scrollBy({top: window.innerHeight, behavior: 'smooth'})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M6 9l6 6 6-6"/>
    </svg>
  </button>
</div>
